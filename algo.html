<script>
(function(){
  if (window.__PSV_TOPKM_INIT__) return;
  window.__PSV_TOPKM_INIT__ = true;

  const btn = document.getElementById('psvTopKmBtn');
  const modal = document.getElementById('psvTopKmModal');
  const closeBtn = document.getElementById('psvClose');
  const refreshBtn = document.getElementById('psvRefresh');
  const body = document.getElementById('psvTopKmBody');
  const lastEl = document.getElementById('psvLastUpdate');

  const searchInput = document.getElementById('psvSearch');
  const clearBtn = document.getElementById('psvClear');
  const countEl = document.getElementById('psvCount');
  const viewAccumulatedBtn = document.getElementById('psvViewAccumulated');
  const viewMonthlyBtn = document.getElementById('psvViewMonthly');

  let __ALL_ITEMS__ = [];
  let __psvScrollY__ = 0;
  let __modalOpen = false;
  let __currentView = 'accumulated'; // 'accumulated' o 'monthly'

  // ✅ Cache en memoria para abrir instantáneo
  let __CACHE__ = { items: null, ts: 0, view: null };
  const CACHE_MS = 60 * 1000; // 1 minuto

  function fmtKm(n){
    if (!isFinite(n)) return '0';
    return new Intl.NumberFormat('es-PE').format(Math.round(n));
  }
  function fmtTime(d){
    return new Intl.DateTimeFormat('es-PE', {
      hour:'2-digit', minute:'2-digit', second:'2-digit'
    }).format(d);
  }
  function norm(s){
    const str = s ? s : '';
    return String(str).toLowerCase().trim();
  }

  function openModal(){
    __modalOpen = true;
    const scrollY = window.scrollY ? window.scrollY : document.documentElement.scrollTop;
    __psvScrollY__ = scrollY;

    document.body.classList.add('psvNoScroll');
    document.body.style.top = `-${__psvScrollY__}px`;
    document.body.style.position = 'fixed';
    document.body.style.width = '100%';

    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden','false');

    modal.offsetHeight;

    setTimeout(() => {
      if (searchInput) searchInput.focus({preventScroll:true});
    }, 100);
  }

  function closeModal(){
    __modalOpen = false;
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden','true');

    document.body.classList.remove('psvNoScroll');
    const topValue = document.body.style.top ? document.body.style.top : '0';
    const scrollY = parseInt(topValue, 10) * -1;

    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.width = '';

    const absScrollY = Math.abs(scrollY);
    const finalScrollY = absScrollY ? absScrollY : __psvScrollY__;
    window.scrollTo(0, finalScrollY);
  }

  function animateBars() {
    setTimeout(() => {
      const bars = document.querySelectorAll('.psvBar');
      bars.forEach(bar => {
        const dataWidth = bar.getAttribute('data-width');
        const targetWidth = dataWidth ? dataWidth : bar.style.width;
        if (targetWidth) {
          bar.style.width = targetWidth;
          setTimeout(() => { bar.style.transition = 'width 0.7s ease'; }, 10);
        }
      });
    }, 60);
  }

  function render(items){
    if (!items.length) {
      body.innerHTML = '<div style="text-align:center; padding:40px 20px; opacity:0.8;">No hay datos disponibles</div>';
      if (countEl) countEl.textContent = '0 resultados';
      return;
    }

    const maxKm = Math.max(...__ALL_ITEMS__.map(x => {
      const km = x.__km ? x.__km : (x.distance ? x.distance : 0);
      return Number(km);
    }), 1);

    const rows = items.map((x) => {
      const rank = x.__rank ? x.__rank : 0;
      const km = Number(x.__km ? x.__km : (x.distance ? x.distance : 0));
      const pct = Math.max(0, Math.min(100, Math.round((km / maxKm) * 100)));
      const isTop1 = rank === 1;
      const isTop2 = rank === 2;
      const isTop3 = rank === 3;

      let medalClass = '';
      let medalIcon = '';
      let rowClass = '';

      if (isTop1) {
        medalClass = 'psvGold';
        medalIcon = '🥇';
        rowClass = 'psvTopRow psvRowGold';
      } else if (isTop2) {
        medalClass = 'psvSilver';
        medalIcon = '🥈';
        rowClass = 'psvTopRow psvRowSilver';
      } else if (isTop3) {
        medalClass = 'psvBronze';
        medalIcon = '🥉';
        rowClass = 'psvTopRow psvRowBronze';
      }

      return `
        <tr class="${rowClass}">
          <td>
            ${medalClass ? `<span class="psvMedal ${medalClass}" title="Top ${rank}">${medalIcon}</span>` : ''}
            <span class="psvBadge">#${rank}</span>
          </td>
          <td>
            <b>${String(x.name ? x.name : 'Sin nombre')}</b>
            ${x.tag ? `<span style="opacity:.7">[${x.tag}]</span>` : ''}
            <div class="psvBarWrap">
              <div class="psvBar" style="width:${pct}%;" data-width="${pct}%"></div>
            </div>
          </td>
          <td>${fmtKm(km)} km</td>
          <td>${x.members ? x.members : '0'}</td>
          <td>${x.total_jobs ? x.total_jobs : (x.jobs ? x.jobs : '0')}</td>
        </tr>
      `;
    }).join('');

    const cards = items.map((x) => {
      const rank = x.__rank ? x.__rank : 0;
      const km = Number(x.__km ? x.__km : (x.distance ? x.distance : 0));
      const pct = Math.max(0, Math.min(100, Math.round((km / maxKm) * 100)));
      const isTop1 = rank === 1;
      const isTop2 = rank === 2;
      const isTop3 = rank === 3;

      let medalClass = '';
      let medalIcon = '';
      let cardClass = '';

      if (isTop1) {
        medalClass = 'psvGold';
        medalIcon = '🥇';
        cardClass = 'psvCardTop1';
      } else if (isTop2) {
        medalClass = 'psvSilver';
        medalIcon = '🥈';
        cardClass = 'psvCardTop2';
      } else if (isTop3) {
        medalClass = 'psvBronze';
        medalIcon = '🥉';
        cardClass = 'psvCardTop3';
      }

      return `
        <div class="psvCard ${cardClass}">
          <div class="psvCardTop">
            <div class="psvCardRank">
              ${medalClass ? `<div class="psvMedal ${medalClass}" title="Top ${rank}">${medalIcon}</div>` : ''}
              <span class="psvBadge">#${rank}</span>
            </div>

            <div style="flex:1; min-width:0;">
              <div class="psvCardName">
                ${String(x.name ? x.name : 'Sin nombre')}
                ${x.tag ? `<span class="psvCardTag">[${x.tag}]</span>` : ''}
              </div>
              <div class="psvBarWrap" style="margin-top:8px;">
                <div class="psvBar" style="width:${pct}%;" data-width="${pct}%"></div>
              </div>
            </div>

            <div class="psvCardKm">${fmtKm(km)} km</div>
          </div>

          <div class="psvCardMeta">
            <div class="psvPill">👥 Miembros: <b>${x.members ? x.members : '0'}</b></div>
            <div class="psvPill">🚚 Viajes: <b>${x.total_jobs ? x.total_jobs : (x.jobs ? x.jobs : '0')}</b></div>
          </div>
        </div>
      `;
    }).join('');

    body.innerHTML = `
      <div class="psvTableWrap">
        <table class="psvTable">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Empresa</th>
              <th>Kilometraje</th>
              <th>Miembros</th>
              <th>Viajes</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>

      <div class="psvCards">${cards}</div>
    `;

    if (countEl){
      countEl.textContent = `Mostrando: ${items.length} / ${__ALL_ITEMS__.length}`;
    }

    animateBars();
  }

  function applyFilter(){
    const q = norm(searchInput ? searchInput.value : '');
    if (!q){ render(__ALL_ITEMS__); return; }

    const filtered = __ALL_ITEMS__.filter(x => {
      const name = norm(x.name);
      const tag = norm(x.tag);
      const nameMatches = name.includes(q);
      const tagMatches = tag.includes(q);
      return nameMatches ? true : tagMatches;
    });

    render(filtered);
  }

  const urlsBase = (view) => {
    const selectedView = view ? view : __currentView;
    
    if (selectedView === 'monthly') {
      return [
        'https://api.mdcdev.me/v2/peruserver/trucky/top-km/monthly?limit=50&_=' + Date.now()
      ];
    } else {
      // acumulado desde enero
      const currentYear = new Date().getFullYear();
      return [
        'https://api.mdcdev.me/v2/peruserver/trucky/top-km?month=1&year=' + currentYear + '&limit=50&_=' + Date.now()
      ];
    }
  };

  async function fetchFirstOk(urls){
    const controllers = urls.map(() => new AbortController());

    const tasks = urls.map((url, i) => (async () => {
      const res = await fetch(url, {
        cache: 'no-store',
        headers: { 'Accept': 'application/json' },
        mode: 'cors',
        signal: controllers[i].signal
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (!json || !json.ok) throw new Error('Bad payload');
      return { json, winner: i };
    })());

    return Promise.any(tasks).then(({ json, winner }) => {
      controllers.forEach((c, idx) => { if (idx !== winner) c.abort(); });
      return json;
    });
  }

  async function loadTop(opts){
    const defaultOpts = {};
    opts = opts ? opts : defaultOpts;
    const silent = !!opts.silent;
    const selectedView = opts.view ? opts.view : __currentView;

    const hasItems = !!__CACHE__.items;
    const cacheNotExpired = (Date.now() - __CACHE__.ts) < CACHE_MS;
    const cacheValid = hasItems ? cacheNotExpired : false;
    const viewMatches = __CACHE__.view === selectedView;
    
    if (cacheValid) {
      if (viewMatches) {
        __ALL_ITEMS__ = __CACHE__.items;
        if (!silent) {
          render(__ALL_ITEMS__);
          lastEl.textContent = '⏱ Última actualización: ' + fmtTime(new Date(__CACHE__.ts));
          applyFilter();
        }
        return __ALL_ITEMS__;
      }
    }

    if (!silent){
      body.innerHTML = '<div class="psvLoading">Cargando datos…</div>';
      if (countEl) countEl.textContent = '—';
      lastEl.textContent = '⏱ Cargando…';
    }

    let data = null;

    try{
      data = await fetchFirstOk(urlsBase(selectedView));
    }catch(e){
      data = null;
      console.warn('TopKM: error al cargar', e);
    }

    const hasValidData = data ? (data.ok ? true : false) : false;
    
    if (!hasValidData) {
      if (!silent){
        body.innerHTML = `
          <div style="text-align:center; padding:30px 20px;">
            <div style="font-size:24px; margin-bottom:10px;">⚠️</div>
            <div style="font-weight:bold; margin-bottom:10px;">Error al cargar datos</div>
            <div style="opacity:0.8; font-size:14px;">Intenta recargar la página o verifica tu conexión</div>
            <button onclick="if(window.psvReloadTopKm){window.psvReloadTopKm();}"
              style="margin-top:15px; padding:8px 16px; background:rgba(0,180,255,.2);
              border:1px solid rgba(0,180,255,.4); border-radius:8px; color:#fff; cursor:pointer;">
              Reintentar
            </button>
          </div>
        `;
        lastEl.textContent = '⏱ Error al cargar';
      }
      return [];
    }

    const rawItems = data.items ? data.items : [];
    __ALL_ITEMS__ = rawItems.map((x, idx) => {
      const distance = x.distance ? x.distance : (x.total_distance ? x.total_distance : 0);
      return {
        ...x,
        __rank: idx + 1,
        __km: Number(distance)
      };
    });

    __CACHE__ = { items: __ALL_ITEMS__, ts: Date.now(), view: selectedView };

    if (!silent){
      render(__ALL_ITEMS__);
      lastEl.textContent = '⏱ Última actualización: ' + fmtTime(new Date(__CACHE__.ts));
      applyFilter();
    }

    return __ALL_ITEMS__;
  }

  window.psvReloadTopKm = () => loadTop({ silent:false, view: __currentView });

  btn.addEventListener('click', async () => {
    openModal();

    const hasCachedItems = __CACHE__.items;
    const viewMatchesCache = __CACHE__.view === __currentView;
    
    if (hasCachedItems && viewMatchesCache) {
      __ALL_ITEMS__ = __CACHE__.items;
      render(__ALL_ITEMS__);
      lastEl.textContent = '⏱ Última actualización: ' + fmtTime(new Date(__CACHE__.ts));
      applyFilter();
    } else {
      await loadTop({ silent:false, view: __currentView });
    }
  });

  closeBtn.addEventListener('click', closeModal);
  refreshBtn.addEventListener('click', () => loadTop({ silent:false, view: __currentView }));

  // Cambiar vista
  viewAccumulatedBtn.addEventListener('click', async () => {
    __currentView = 'accumulated';
    viewAccumulatedBtn.classList.add('psvViewActive');
    viewMonthlyBtn.classList.remove('psvViewActive');
    await loadTop({ silent:false, view: 'accumulated' });
  });

  viewMonthlyBtn.addEventListener('click', async () => {
    __currentView = 'monthly';
    viewMonthlyBtn.classList.add('psvViewActive');
    viewAccumulatedBtn.classList.remove('psvViewActive');
    await loadTop({ silent:false, view: 'monthly' });
  });

  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && __modalOpen) closeModal();
  });

  if (searchInput) {
    searchInput.addEventListener('input', () => {
      clearBtn.style.visibility = searchInput.value ? 'visible' : 'hidden';
      applyFilter();
    });
    clearBtn.style.visibility = searchInput.value ? 'visible' : 'hidden';
  }

  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (searchInput) {
        searchInput.value = '';
        clearBtn.style.visibility = 'hidden';
        applyFilter();
        searchInput.focus();
      }
    });
  }

  modal.addEventListener('touchstart', (e) => {
    if (e.target.closest('.psvContentScroll')) e.stopPropagation();
  }, { passive: true });

  modal.addEventListener('touchmove', (e) => {
    const isInsideScroll = e.target.closest && e.target.closest('.psvContentScroll');
    if (!isInsideScroll) e.preventDefault();
  }, { passive: false });

  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  function schedulePreload(){
    loadTop({ silent:true, view: __currentView }).catch(()=>{});
  }

  window.addEventListener('load', () => {
    setTimeout(schedulePreload, 800);
  });

  btn.addEventListener('mouseenter', () => { if (!__CACHE__.items) schedulePreload(); });
  btn.addEventListener('touchstart', () => { if (!__CACHE__.items) schedulePreload(); }, { passive:true });

  if ('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', () => {
      if (__modalOpen) {
        const modalBox = document.querySelector('.psvModalBox');
        if (modalBox) {
          const vh = window.visualViewport.height;
          modalBox.style.height = `min(720px, ${vh - 40}px)`;
        }
      }
    });
  }
})();
</script>
